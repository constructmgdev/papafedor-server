# EssentialsC — schedules.yml
#
# Define automated schedules that run actions at a fixed interval or at a
# specific time every day. Each top-level key is the schedule's name and is
# used with the /schedules command.
#
#
# Schedule properties
#
#   enabled       Set to false to disable this schedule without deleting it.
#
#   interval      How often to run, in seconds. Mutually exclusive with 'time'.
#
#   time          A fixed time of day (HH:mm, 24-hour) at which to run once
#                 per day. Mutually exclusive with 'interval'.
#
#   worlds        Optional list of world names. When set, actions that target
#                 players (title, actionbar, bossbar, sound) will only affect
#                 players in these worlds. Broadcast and console commands are
#                 unaffected. Omit or leave empty for all worlds.
#
#   permission    Optional permission node. When set, player-targeted actions
#                 will only affect players who have this permission.
#                 Omit or leave empty to target everyone.
#
#   actions       List of actions to run in order. See action types below.
#
#
# Action types
#
#   broadcast     Sends a MiniMessage formatted message to all players.
#     message       The message to send.
#
#   title         Sends a title screen to targeted players.
#     title         The large title text (MiniMessage).
#     subtitle      The smaller subtitle text (MiniMessage).
#     fade-in       Fade-in duration in ticks (default: 10).
#     stay          Display duration in ticks (default: 70).
#     fade-out      Fade-out duration in ticks (default: 20).
#
#   actionbar     Sends an action bar message to targeted players.
#     message       The message to send (MiniMessage).
#
#   bossbar       Shows a boss bar to targeted players for a set duration.
#     message       The boss bar label (MiniMessage).
#     color         Bar color: PINK, BLUE, RED, GREEN, YELLOW, PURPLE, WHITE.
#     style         Bar style: SOLID, SEGMENTED_6, SEGMENTED_10, SEGMENTED_12, SEGMENTED_20.
#     duration      How long to show the bar, in seconds.
#
#   sound         Plays a sound for targeted players.
#     sound         Bukkit sound name (e.g. ENTITY_PLAYER_LEVELUP).
#     volume        Volume multiplier (default: 1.0).
#     pitch         Pitch multiplier (default: 1.0).
#
#   command       Runs a command.
#     run-as        Who runs the command: 'console' or 'player'.
#                   When 'player', the command runs once per targeted player.
#     command       The command to run, without the leading slash.
#                   Supports {player} and {world} placeholders when run-as is 'player'.
#
#
# Available placeholders in messages
#
#   {player}      The player's display name (player-targeted actions only).
#   {world}       The player's current world (player-targeted actions only).
#   {online}      Number of players currently online.
#   {tps}         Current server TPS (1-minute average).
#   {time}        Current server time in HH:mm format.

schedules:

  # Rotating server tip broadcast every 10 minutes.
  # Reminds players of useful commands they might not know about.
  # Swap out the message for whatever fits your server.
  server-tip:
    enabled: false
    interval: 600
    actions:
      - type: broadcast
        message: "<#444444>[ <#FFD700><b>Tip<reset><#444444> ]<reset> <#CCCCCC>Did you know you can use <#FFD700>/rtp<#CCCCCC> to teleport to a random location in the wild?"
      - type: sound
        sound: BLOCK_NOTE_BLOCK_PLING
        volume: 0.6
        pitch: 1.8

  # Nightly restart warning at 23:50 — gives players 10 minutes to wrap up.
  # Combines a loud broadcast, a title, an action bar reminder and a warning sound
  # so nobody misses it regardless of what they are looking at.
  restart-warning:
    enabled: false
    time: "23:50"
    actions:
      - type: broadcast
        message: "<#FF4444><b>⚠ <reset><#FFCCCC>The server will restart in <#FF4444><b>10 minutes<reset><#FFCCCC>. Please find a safe spot and log off!"
      - type: title
        title: "<#FF4444><b>Restart in 10 min"
        subtitle: "<#AAAAAA>Find a safe spot and log off"
        fade-in: 10
        stay: 120
        fade-out: 20
      - type: actionbar
        message: "<#FF4444>⚠ <#FFCCCC>Server restarting in <#FF4444>10 minutes"
      - type: sound
        sound: BLOCK_NOTE_BLOCK_BASS
        volume: 1.0
        pitch: 0.5

  # Hourly automatic backup triggered through the schedule system.
  # Keeps your data safe without any manual intervention.
  # Pairs with the backup.keep-last setting in config.yml.
  auto-backup:
    enabled: false
    interval: 3600
    actions:
      - type: command
        run-as: console
        command: "essc backup"