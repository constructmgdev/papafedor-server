# EssentialsC — config.yml
#
# After editing this file, run /essc reload to apply changes without restarting.
# MiniMessage formatting is supported in all message fields.
# MiniMessage reference: https://docs.advntr.dev/minimessage/format.html

# The Config Version
# Do NOT CHANGE this
config-version: 1

# General settings

# Print extra information to the console. Useful when diagnosing issues.
# Disable this on production servers.
debug: false

# The language file to use for all plugin messages.
# Must match a file in the lang/ folder (e.g. en_US -> lang/en_US.json).
default-language: en_US

# The fallback language used if a message is missing in the selected language file.
# Must match a file in the lang/ folder (e.g. en_US -> lang/en_US.json).
fallback-language: en_US

# Help
# The help menu that shows for every command
help:
  # Whether a sound should play when the help menu is shown.
  play-sound: true
  
  # Whether the help menu should be animated.
  animated: true
  
  # Delay (in ticks) between each animation step in the help menu.
  animation-delay-ticks: 3


# Backup
#
# EssentialsC can automatically back up its entire data folder (database,
# configs, lang files) into a timestamped zip archive stored in backups/.
# Backups can also be triggered manually with /essc backup.

backup:
  # Set to false to disable the backup system entirely.
  enabled: true
  
  # Maximum number of backups to keep in the backups/ folder.
  # Once this limit is exceeded, the oldest backup is deleted automatically.
  # Set to -1 to keep all backups and never delete any.
  keep-last: 10
  
  # Create a backup automatically when the server shuts down.
  on-shutdown: true

# Fly
#
# Settings for the /fly command.

fly:
  # Whether a player's fly status should be saved and persist between sessions.
  persistent: true
  
  # Whether to automatically restore fly mode when the player rejoins the server.
  restore-on-join: true
  
  # Whether to disable fly mode when the player joins the server.
  disable-on-join: false

# Broadcast
#
# Settings for the /broadcast <args> command.

broadcast:
  # Prefix prepended to all broadcast messages. Supports MiniMessage.
  prefix: <#333333>[<#F55E27>Broadcast<#333333>] <white>

# Healx
#
# Settings for the /heal command.

heal:
  # Also restore the player's hunger bar and saturation to full when healing.
  feed-player: true
  
  # Remove negative potion effects (poison, blindness, slowness, etc.) on heal.
  clear-negative-effects: true


# MOTD
#
# Displays a message of the day to players when they join.
# The content is read from the file specified below (default: motd.txt).
# MiniMessage formatting is supported inside the file.

motd:
  # Set to false to disable the MOTD entirely.
  enabled: true
  
  # The file (inside the EssentialsC plugin folder) to read the MOTD from.
  file: motd.txt
  
  # Maximum width of each line in characters before it wraps.
  max-line-width: 50


# LuckPerms Integration
#
# Requires LuckPerms to be installed on the server.

luckperms:
  # Format player chat messages using LuckPerms prefix and suffix data.
  chat-formatting: false
  
  # The chat format used for all players unless overridden by group-formats below.
  # Available placeholders: <DISPLAYNAME>, <USERNAME>, <MESSAGE>
  chat-format: "<DISPLAYNAME>&7: &f<MESSAGE>"
  # owner: '&c[Owner] <USERNAME> &7» &f<MESSAGE>'

    # Show LuckPerms prefixes in the TAB player list.
  tab-formatting: true


# DiscordSRV Integration
#
# Requires DiscordSRV to be installed on the server.
# Controls which EssentialsC events are relayed to Discord.

discordsrv:
  # Set to false to disable all DiscordSRV integration.
  enabled: true
  
  # Channel configuration.
  # The name value must match a channel key defined in DiscordSRV's config.yml.
  channels:
    punishments:
      name: punishments
  
  # Per-event settings. Set enabled to false to stop relaying that event.
  # Color accepts any hex color code.
  events:
    ban:
      enabled: true
      color: '#E74C3C'
    kick:
      enabled: true
      color: '#F39C12'
    mute:
      enabled: true
      color: '#9B59B6'
    kit:
      enabled: true
      color: '#3498DB'
    home:
      enabled: true
      color: '#2ECC71'
    home_delete:
      enabled: true
      color: '#E74C3C'
    banip:
      enabled: true
      color: '#E74C3C'
  
  # Show a player's avatar next to their name in Discord embeds.
  show-avatar: true
  
  # URL used to fetch player avatars. {uuid} is replaced with the player's UUID.
  avatar-url: https://crafthead.net/helm/{uuid}


# Economy
#
# Requires Vault to be installed on the server.
# EssentialsC registers itself as a Vault economy provider.

economy:
  # Set to false to disable the economy system and unregister the Vault provider.
  enabled: true
  
  # The balance every new player starts with.
  starting-balance: '100.00'
  
  currency:
    # Displayed when the amount is exactly 1.
    singular: Dollar
    # Displayed for all other amounts.
    plural: Dollars
  
  # The smallest amount allowed in any transaction (pay, eco give, etc.).
  minimum-transaction: '0.01'
  
  # The maximum balance a player can hold. Set to -1 for no limit.
  max-balance: -1
  
  # Java DecimalFormat pattern used when displaying amounts.
  format: '#,##0.00'


# Chat

chat:
  
  # Should the chat system even be enabled ?
  enabled: true
  
  # the message that will be displayed instead of the link
  link-removal-message: <#F54927>[<#FF917D>link removed<#F54927>]
  
  # Which links should we allow ?
  link-whitelist:
  - youtube.com
  - modrinth.com
  - net.godlycow.org/essc/landingpage
  
  slow-mode:
    # Whether chat slow mode is enabled.
    enabled: false
    
    # Delay (in seconds) players must wait between sending messages.
    delay-seconds: 3
  
  # Caps lock prevention - converts messages with too many uppercase letters to lowercase.
  # Threshold is the ratio of uppercase letters (0.0 to 1.0, e.g. 0.7 = 70%).
  capslock-threshold: 0.7
  
  # Whether to strip MiniMessage color formatting from console output.
  strip-colors-from-console: true
  
  mention:
    # Whether player mentions in chat are enabled.
    enabled: true
    
    # Format used when a player is mentioned.
    # Available placeholder: <player>
    # Supports MiniMessage formatting.
    format: <#4BA8DE><player><reset>


# Player List
#
# Settings for the /playerlist (or /list) command.

playerlist:
  # Show the player's LuckPerms prefix next to their name in the list.
  show-luckperms-prefix: true
  
  # How many player names to show per line.
  players-per-line: 10

# Random Teleport (RTP)

rtp:
  # Set to false to completely disable RTP, including the /rtp command.
  enabled: true
  
  # Set to false to unregister the /rtp command from the server's command map
  # while keeping the rest of the RTP system active internally.
  register-command: true
  
  # Seconds a player must wait between uses of /rtp.
  cooldown: 60
  
  # Seconds the player must stand still before being teleported.
  # Set to 0 to teleport instantly.
  warmup: 5
  
  # Cancel the teleport if the player moves during the warmup period.
  cancel-on-movement: true
  
  # Play particles during the warmup.
  particles: true
  
  # Maximum number of attempts to find a safe landing spot before giving up.
  max-attempts: 10
  
  # The minimum Y level a player can be teleported to.
  min-y: 64
  
  # The maximum Y level a player can be teleported to.
  max-y: 100
  
  # Restrict RTP to within the world border if one is set.
  use-world-border: true
  
  # Global defaults — used for any world not listed under 'worlds' below.
  global:
    min-radius: 1000
    max-radius: 10000
    blocked-biomes:
    - ocean
    - deep_ocean
    - river
  
  # Per-world RTP configuration.
  # Any world not listed here uses the global defaults above.
  # Set enabled to false to block RTP in that world entirely.
  worlds:
    world:
      enabled: true
      display-name: <#00E05D><b>Overworld
      min-radius: 1000
      max-radius: 10000
      blocked-biomes:
      - ocean
      - deep_ocean
      - river
    
    world_nether:
      enabled: false
      display-name: <#FF7A52><b>Nether
      min-radius: 500
      max-radius: 5000
      blocked-biomes: []
    
    world_the_end:
      enabled: true
      display-name: <#FFE152><b>The End
      min-radius: 500
      max-radius: 3000
      blocked-biomes: []

# To add a custom world, duplicate and uncomment the block below.
# my_custom_world:
#   enabled: true
#   display-name: "<gold><b>Custom World"
#   min-radius: 500
#   max-radius: 8000
#   blocked-biomes:
#     - ocean


# Teleport Requests (TPA)

tpa:
  # Seconds a player must wait between sending /tpa requests.
  cooldown: 60
  
  # Seconds the player must stand still before being teleported.
  warmup: 3
  
  # Seconds before an unanswered request automatically expires.
  timeout: 60
  
  # Maximum number of incoming TPA requests a player can have at once.
  max-pending: 5
  
  # Maximum number of outgoing TPA requests a player can send at once.
  max-outgoing: 1
  
  # Cancel the teleport if the sender moves during the warmup.
  deny-movement: true
  
  # Play particles during the warmup.
  particles: true
  
  # Play sounds during TPA events.
  sounds: true
  
  # Worlds where /tpa and /tpahere are blocked.
  blocked-worlds: []



# Homes

home:
  # How players interact with their homes.
  # "command" — players type /home <name> directly.
  # "gui"     — all home interactions go through an inventory GUI.
  mode: command
  
  # The home name used when no name argument is given in command mode,
  # and for the quick-create button in GUI mode.
  default-name: home
  
  # The default maximum number of homes a player can set.
  # This can be overridden per-player with LuckPerms permissions:
  #   essentialsc.sethome.<number>     (e.g. essentialsc.sethome.10)
  #   essentialsc.sethome.unlimited
  #   essentialsc.sethome.admin
  max-homes: 3
  
  # Seconds a player must wait between home teleports.
  # Set to 0 to disable the cooldown.
  # Bypassed by: essentialsc.home.admin
  cooldown: 5
  
  # Seconds the player must stand still before being teleported.
  # Set to 0 to teleport instantly.
  # Bypassed by: essentialsc.home.admin
  warmup: 3
  
  # Cancel the teleport if the player moves during the warmup.
  cancel-on-movement: true
  
  # Play particles on arrival.
  particles: true
  
  # Play sounds during home teleport events.
  sounds: true
  
  # Worlds where /home and /sethome are completely blocked.
  # Use the exact world folder name.
  blocked-worlds:
  - world_example_blocked


# Spawn

spawn:
  # Seconds a player must wait between uses of /spawn.
  cooldown: 5
  
  # Seconds the player must stand still before being teleported.
  warmup: 3
  
  # Teleport players to spawn the first time they join the server.
  teleport-on-first-join: true
  
  # Play particles on arrival.
  particles: true
  
  # Play sounds during the spawn teleport.
  sounds: true
  
  # Cancel the teleport if the player moves during the warmup.
  cancel-on-movement: true
  
  # Whether players should be teleported to the configured spawn on respawn.
  teleport-on-respawn: true
  
  # Whether beds can override the spawn location.
  # If false, players will always respawn at the configured spawn.
  allow-beds-to-override: true



# Join and Leave Messages

join-leave-messages:
  # Set to false to disable custom join and leave messages entirely,
  # falling back to Minecraft's default messages.
  enabled: true
  
  # The message broadcast when a player joins.
  # Available placeholders: <player>
  join: <dark_gray>[<#70F40B>+<dark_gray>] <#A3F863><player> joined the game
  
  # The message broadcast when a player leaves.
  # Available placeholders: <player>
  leave: <dark_gray>[<#F52727>-<dark_gray>] <#FA8F8F><player> left the game
  
  # Whether vanished players should be hidden from other players.
  hide-vanished: true
  
  # Message broadcast when a player joins the server for the first time.
  # Supports MiniMessage formatting (e.g. <yellow>, <player>).
  first-join: <#F5CF27><b>Welcome!<reset> <#F8DC63><player> just joined for the first
    time!



# Back
#
# Settings for the /back command, which returns a player to their
# previous location after a teleport or death.

back:
  # Seconds the player must stand still before being teleported back.
  # Set to 0 to teleport instantly.
  warmup: 3
  
  # Seconds a player must wait between uses of /back.
  # Set to 0 to disable the cooldown.
  cooldown: 5
  
  # Play particles on arrival.
  particles: true
  
  # Play sounds during the back teleport.
  sounds: true
  
  # Cancel the teleport if the player moves during the warmup.
  cancel-on-movement: true


# Scoreboard
#
# A per-player sidebar scoreboard updated on a fixed interval.
# Supports PlaceholderAPI placeholders (%placeholder%) and MiniMessage formatting.

scoreboard:
  # Set to false to disable the scoreboard entirely.
  enabled: true
  
  # How often the scoreboard refreshes, in ticks. 20 ticks = 1 second.
  update-interval: 20
  
  # The title shown at the top of the scoreboard. Supports MiniMessage.
  title: <#279FF5><b>ꜱᴇʀᴠᴇʀɴᴀᴍᴇ
  
  # The lines displayed on the scoreboard, from top to bottom.
  # Supports MiniMessage and PlaceholderAPI placeholders.
  # Use "" for an empty line.
  lines:
  - ''
  - <#279FF5><b>%player_name%:<reset>
  - '<#279FF5><b>|<reset> <#9CD6FF>ʀᴀɴᴋ: <white>%luckperms_prefix%'
  - '<#279FF5><b>|<reset> <#9CD6FF>ʙᴀʟᴀɴᴄᴇ: <white>%vault_eco_balance_formatted%'
  - '<#279FF5><b>|<reset> <#9CD6FF>ᴋɪʟʟѕ: <white>%statistic_player_kills%'
  - '<#279FF5><b>|<reset> <#9CD6FF>ᴅᴇᴀᴛʜѕ: <white>%statistic_deaths%'
  - '<#279FF5><b>|<reset> <#9CD6FF>ʟᴀᴛᴇɴᴄʏ: <white>%player_ping%<#9CD6FF>ᴍꜱ'
  - ''
  - '<#279FF5><b>|<reset> <#9CD6FF>ᴏɴʟɪɴᴇ: <white>%server_online%<gray>/<white>%server_max_players%'
  - '<#279FF5><b>|<reset> <#9CD6FF>ᴛᴘꜱ: <white>%server_tps_1%'
  - '<#279FF5><b>|<reset> <#9CD6FF>ᴠᴇʀꜱɪᴏɴ: <white>%server_version%'

# Small caps font generator: https://www.piliapp.com/cool-text/small-caps/


# Item Rename
#
# Settings for the /rename command.

rename:
  # Enable the word blacklist check on rename input.
  blacklist-enabled: true
  
  # Words that cannot appear in a renamed item's name.
  blacklist-words:
  - badword
  - hello
  
  # Maximum number of characters allowed in a renamed item name.
  max-length: 50
  
  # Minimum number of characters required in a renamed item name.
  min-length: 1
  
  # Normalize the input before checking length (strips invisible characters, etc.).
  normalize-enabled: true
  
  # Strip color codes before running the blacklist check so players
  # can't hide blacklisted words inside color formatting.
  strip-colors-for-check: true


# Spawn Entity
#
# Settings for the /spawnentity command.

spawnentity:
  # Maximum number of entities that can be spawned in a single command use.
  max-amount: 10


# Vanish

vanish:
  # Remove the player from the TAB list while vanished.
  hide-from-tab: true
  
  # Give the player Night Vision while vanished so they can see in dark areas.
  give-night-vision: true
  
  # Prevent mobs from targeting vanished players.
  prevent-mob-target: true
  
  # Disable collisions for vanished players so they can pass through other entities.
  disable-collisions: true


# Nicknames
#
# Settings for the /nick command.

nickname:
  # Set to false to disable the nickname system and unregister /nick.
  enabled: true
  
  # Minimum number of characters allowed in a nickname.
  min-length: 3
  
  # Maximum number of characters allowed in a nickname.
  max-length: 16
  
  # Allow players with essentialsc.nick.colors to use color codes in nicknames.
  allow-colors: true
  
  # Allow players with essentialsc.nick.formats to use formatting (bold, italic, etc.).
  allow-formats: true
  
  # Enable the nickname blacklist check.
  blacklist-enabled: true
  
  # Words that cannot appear in a nickname.
  blacklist-words: []
  
  # Normalize the nickname input before length and blacklist checks.
  normalize-enabled: true
  
  # Prevent two players from having the same nickname at the same time.
  unique: true
  
  # Update the player's TAB list entry to show their nickname.
  update-tab: true
  
  # Character(s) prepended to nicknames so players can distinguish them
  # from real usernames.
  indicator: '~'
  
  # Whether to show the player's real username when hovering over their nickname in chat.
  show-realname-on-hover: true
  
  # Format for the hover text when hovering a nickname in chat.
  # Available placeholders: <realname>, <nick>, <prefix>, <suffix>
  hover-format: '<gray>Real name: <white><realname>'
  
  # Whether clicking a nickname in chat suggests the /msg <player> command.
  click-suggest-msg: true
  
  # When a player has a nickname, show "Nick (RealName)" in Discord
  # instead of just the plain nickname. Requires DiscordSRV.
  discord-show-realname: true



# Shop
#
# System settings for the /shop command.
# GUI appearance, button layout, and category configuration are in shop/main.yml.

shop:
  # Set to false to disable the shop system and unregister /shop.
  enabled: true
  
  # Log every buy and sell transaction to the console and plugin log.
  log-transactions: true
  
  # Currency labels used in shop transaction messages.
  currency:
    singular: Dollar
    plural: Dollars

# Sell
#
# Settings for the sell system, including the /sell GUI, /worth command,
# and /quicksell command. All sell prices are read from your shop configuration files.

sell:
  # Enable or disable the entire sell system.
  # When false, /sell, /worth, and /quicksell commands will be disabled.
  enabled: true
  
  # GUI Settings for the /sell command.
  gui:
    # The title displayed at the top of the sell GUI.
    # Supports MiniMessage formatting (gradients, colors, etc.)
    title: <#27C8F5>Sell Items</#27C8F5>
    
    # The size of the sell GUI inventory.
    # Must be a multiple of 9 (9, 18, 27, 36, 45, or 54).
    # 54 provides 21 input slots with borders and a sell button.
    size: 54
    
    # The material used for the GUI border.
    # Must be a valid Bukkit Material name.
    border-material: GRAY_STAINED_GLASS_PANE
    
    # Play sounds when opening, selling, or cancelling in the GUI.
    sounds: true


# Hat
#
# Settings for the /hat command.

hat:
  # Enable the material blacklist check.
  blacklist-enabled: true
  
  # Materials that cannot be worn as a hat. Must be valid Bukkit Material names.
  blacklist-items:
  - bedrock
  - barrier
  - command_block
  - structure_void
  - jigsaw
  - light
  
  # Allow full blocks (not just items) to be worn as hats.
  allow-blocks: false
  
  # Require the item to have a lore before it can be worn.
  require-lore: false
  
  # Require the item to have a custom name before it can be worn.
  require-custom-name: false


# Auction House
#
# Settings for the /ah command.

auction-house:
  # Set to false to disable the auction house and unregister /ah.
  enabled: true
  
  # Maximum number of active listings a single player can have at one time.
  max-auctions-per-player: 5
  
  # How long a listing stays active before it expires, in hours.
  duration-hours: 48
  
  # Minimum price a player can list an item for.
  min-price: '1.00'
  
  # Maximum price a player can list an item for. Set to -1 for no limit.
  max-price: '-1'
  
  # Whether enchanted books are allowed to be sold.
  allow-enchanted-books: false
  
  # List of materials that cannot be sold.
  # Use Bukkit material names (e.g. DIAMOND, NETHERITE_INGOT).
  blacklisted-materials:
  - DRAGON_EGG
  - BEACON
  - NETHER_STAR
  
  # Whether to notify the player when they successfully sell items.
  notify-on-sale: true



# Warps

warp:
  # Set to false to disable the warp system entirely.
  enabled: true
  
  # Seconds a player must wait between warp teleports.
  cooldown: 5
  
  # Seconds the player must stand still before being teleported.
  warmup: 3
  
  # Cancel the teleport if the player moves during the warmup.
  cancel-on-movement: true
  
  # Play particles on arrival.
  particles: true
  
  # Play sounds during warp teleport events.
  sounds: true
  
  # Worlds where warping is blocked.
  blocked-worlds:
  - world_nether
  - world_the_end
  
  # Group warps by category in the /warps GUI.
  group-by-category: true
  
  # Maximum number of characters allowed in a warp name.
  max-name-length: 16
  
  # Limit how many warps a single player can create.
  limit-per-player:
    enabled: true
    max: 5


# AFK
#
# Settings for the automatic AFK detection system.

afk:
  # Set to false to disable the AFK system entirely.
  enabled: true
  
  # Seconds of inactivity before a player is marked as AFK automatically.
  timeout-seconds: 300
  
  # Seconds of AFK time before the player is kicked from the server.
  # Set to -1 to never kick AFK players.
  kick-timeout-seconds: 1800
  
  # Show an AFK prefix next to the player's name in the TAB list.
  tab-placeholder-enabled: true
  
  # The prefix shown in TAB while a player is AFK. Supports MiniMessage.
  tab-placeholder: '<color:#FF6B6B>[AFK]</color> '
  
  # Broadcast a message to the server when a player enters or leaves AFK mode.
  broadcast-enabled: true
  
  # Show a title on screen when the player enters AFK mode.
  title-enabled: true
  title: <color:#FF6B6B>You are now AFK</color>
  subtitle: <color:#FFE66D>Move to return</color>
  
  # Prevent AFK players from taking damage from any source.
  prevent-damage: true
  
  # Prevent mobs from targeting AFK players.
  prevent-mob-target: true
  
  # Prevent AFK players from picking up items.
  prevent-pickup: true
  
  # Freeze the player in place while AFK so they cannot be pushed.
  freeze-player: false
  
  # Commands that AFK players are not allowed to run.
  blocked-commands:
  - spawn
  - home
  - tpa
  - tpahere
  - warp
  - shop
  
  # Show the player's coordinates in the /afklist output.
  list-show-location: true
  
  # Show the player's world in the /afklist output.
  list-show-world: true
  
  # How to sort the /afklist output.
  # Options: time (longest AFK first), name (alphabetical), world
  list-sort-by: time

